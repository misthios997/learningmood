<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Bahasa Indonesia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #252940;
    --card: #1e2238;
    --accent: #f5c842;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --text: #ffffff;
    --muted: #cccccc;
    --border: #2e3352;
    --correct: #43e97b;
    --wrong: #ff6b6b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── INTRO ── */
  #intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    background: radial-gradient(ellipse at 30% 20%, #1e2a5a44 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, #3a1a4a44 0%, transparent 60%),
                var(--bg);
  }
  #intro .badge {
    background: linear-gradient(135deg, var(--accent), #ffaa00);
    color: #000;
    font-weight: 700;
    font-size: .75rem;
    letter-spacing: .15em;
    padding: .35rem .9rem;
    border-radius: 99px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: inline-block;
  }
  #intro h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #intro p {
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 2.5rem;
  }
  .stats-row {
    display: flex;
    gap: 2rem;
    margin-bottom: 2.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat .num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }
  .stat .lbl {
    font-size: .8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), #ffaa00);
    color: #000;
    border: none;
    padding: 1rem 3rem;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 99px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: .04em;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 8px 32px #f5c84255;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px #f5c84277; }

  /* ── QUIZ ── */
  #quiz { display: none; min-height: 100vh; padding: 1.5rem; }
  .quiz-header {
    max-width: 720px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .q-counter {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 700;
  }
  .progress-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    min-width: 120px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ffaa00);
    border-radius: 99px;
    transition: width .4s ease;
  }
  .score-live {
    font-size: .9rem;
    color: var(--muted);
    font-weight: 500;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 1.2rem;
    padding: 2rem;
    max-width: 720px;
    margin: 0 auto 1.5rem;
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .topic-tag {
    display: inline-block;
    background: #2e3352;
    color: var(--accent);
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: .25rem .75rem;
    border-radius: 99px;
    margin-bottom: 1rem;
  }
  .question-text {
    font-size: 1.05rem;
    line-height: 1.7;
    font-weight: 500;
    margin-bottom: 1.5rem;
  }
  .options { display: flex; flex-direction: column; gap: .75rem; }
  .opt, .opt span, .opt * { color: #ffffff !important; -webkit-text-fill-color: #ffffff !important; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: .9rem;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: .75rem;
    padding: .9rem 1.1rem;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    font-size: .95rem;
    line-height: 1.5;
    text-align: left;
    color: #ffffff !important;
  }
  .opt:hover:not(.disabled) { border-color: var(--accent); background: #22263a; }
  .opt .letter {
    min-width: 1.6rem;
    height: 1.6rem;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .8rem;
    flex-shrink: 0;
    color: var(--muted);
  }
  .opt.selected { border-color: var(--accent); background: #2e3352; }
  .opt.selected .letter { background: var(--accent); color: #000; }
  .opt.correct { border-color: var(--correct); background: #1a3a2a; }
  .opt.correct .letter { background: var(--correct); color: #000; }
  .opt.wrong { border-color: var(--wrong); background: #3a1a1a; }
  .opt.wrong .letter { background: var(--wrong); color: #fff; }
  .opt.disabled { cursor: default; }

  .feedback {
    margin-top: 1rem;
    padding: .85rem 1rem;
    border-radius: .65rem;
    font-size: .9rem;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #1a3a2a; border-left: 3px solid var(--correct); color: #a0f0c0; }
  .feedback.bad { background: #3a1a1a; border-left: 3px solid var(--wrong); color: #ffaaaa; }

  .btn-next {
    display: none;
    background: linear-gradient(135deg, var(--accent), #ffaa00);
    color: #000;
    border: none;
    padding: .85rem 2.5rem;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 99px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin: 0 auto;
    display: none;
    transition: transform .2s;
  }
  .btn-next:hover { transform: translateY(-1px); }
  .btn-next.show { display: block; }

  /* ── RESULT ── */
  #result {
    display: none;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    text-align: center;
    background: radial-gradient(ellipse at 50% 0%, #1e2a5a55 0%, transparent 60%), var(--bg);
  }
  #result h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem,7vw,4rem);
    font-weight: 900;
    margin-bottom: .5rem;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .grade-badge {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    display: block;
    margin: 1rem auto;
  }
  .score-big {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
  }
  .result-stats {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin: 1.5rem 0;
  }
  .r-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 1rem 1.5rem;
    min-width: 120px;
  }
  .r-stat .rn { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; }
  .r-stat .rl { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .review-section {
    max-width: 720px;
    margin: 2rem auto 0;
    text-align: left;
  }
  .review-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 1rem;
    color: var(--accent);
  }
  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: .75rem;
    padding: 1rem;
    margin-bottom: .75rem;
    font-size: .88rem;
    line-height: 1.6;
  }
  .review-item .ri-q { font-weight: 600; margin-bottom: .4rem; }
  .review-item .ri-correct { color: var(--correct); }
  .review-item .ri-wrong { color: var(--wrong); }
  .btn-restart {
    background: linear-gradient(135deg, var(--accent), #ffaa00);
    color: #000;
    border: none;
    padding: .9rem 2.5rem;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 99px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin-top: 2rem;
    transition: transform .2s;
  }
  .btn-restart:hover { transform: translateY(-2px); }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <span class="badge">📚 Ulangan Harian</span>
  <h1>Kuis Bahasa<br>Indonesia</h1>
  <p>Uji pemahamanmu tentang Teks Ulasan, Teks Eksplanasi, Pidato, Kalimat Efektif, Ejaan, dan Teks Laporan.</p>
  <div class="stats-row">
    <div class="stat"><span class="num">45</span><span class="lbl">Soal</span></div>
    <div class="stat"><span class="num">6</span><span class="lbl">Topik</span></div>
    <div class="stat"><span class="num">PG</span><span class="lbl">Pilihan Ganda</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Mulai Kuis ▶</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <span class="q-counter" id="qCounter">1 / 51</span>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:2%"></div></div>
    <span class="score-live" id="scoreLive">Skor: 0</span>
  </div>
  <div class="card" id="questionCard">
    <span class="topic-tag" id="topicTag"></span>
    <p class="question-text" id="questionText"></p>
    <div class="options" id="optionsDiv"></div>
    <div class="feedback" id="feedbackDiv"></div>
  </div>
  <div style="max-width:720px;margin:0 auto;text-align:right;">
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Soal Berikutnya →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <h2>Hasil Kuis</h2>
  <div class="score-big" id="scoreFinal"></div>
  <div class="grade-badge" id="gradeBadge"></div>
  <div class="result-stats">
    <div class="r-stat"><div class="rn" id="rCorrect" style="color:var(--correct)"></div><div class="rl">Benar</div></div>
    <div class="r-stat"><div class="rn" id="rWrong" style="color:var(--wrong)"></div><div class="rl">Salah</div></div>
    <div class="r-stat"><div class="rn" id="rPct" style="color:var(--accent)"></div><div class="rl">Nilai</div></div>
  </div>
  <div class="review-section">
    <h3>📋 Review Jawaban</h3>
    <div id="reviewList"></div>
  </div>
  <button class="btn-restart" onclick="restartQuiz()">🔄 Ulangi Kuis</button>
</div>

<script>
const questions = [
  // No.1 – Teks eksplanasi memberikan gambaran terjadinya fenomena alam; teks resensi = mengulas buku/film; ulasan = memberikan ulasan produk
  {
    topic: "Teks Eksplanasi & Ulasan",
    q: "Teks eksplanasi memberikan gambaran tentang...",
    opts: [
      "Cara mengulas buku atau film",
      "Terjadinya fenomena alam atau sosial",
      "Ulasan terhadap suatu produk",
      "Pengalaman pribadi penulis"
    ],
    ans: 1
  },
  // No.2 – Teks tanggapan: netral & objektif, positif & negatif, ada yang kritik
  // kritik = mengkritik tanpa ada celah; positif = mengkritik namun ada celah (menjelekkan); objektif = mengkritik & memberi saran
  {
    topic: "Teks Tanggapan",
    q: "Dalam teks tanggapan, tanggapan yang bersifat 'objektif' adalah...",
    opts: [
      "Mengkritik tanpa ada celah sama sekali",
      "Mengkritik namun ada celah yang menjelekkan",
      "Mengkritik dan memberi saran secara seimbang",
      "Hanya memuji tanpa ada kritikan"
    ],
    ans: 2
  },
  // No.3 – Tanggapan (soal serupa no.2 = mencari contoh tanggapan)
  {
    topic: "Teks Tanggapan",
    q: "Manakah kalimat yang merupakan contoh tanggapan bersifat 'positif' (mengkritik namun ada celah/menjelekkan)?",
    opts: [
      "Film ini sangat menghibur dan wajib ditonton semua orang.",
      "Film ini memang seru, namun sayangnya ending-nya sangat mengecewakan.",
      "Film ini ditulis oleh sutradara ternama.",
      "Film ini tayang setiap hari Jumat."
    ],
    ans: 1
  },
  // No.4 – Mencari saran pada teks
  {
    topic: "Teks Tanggapan",
    q: "Kalimat yang mengandung saran dalam teks ulasan biasanya menggunakan kata...",
    opts: [
      "Karena, sehingga, akibatnya",
      "Sebaiknya, hendaknya, seharusnya",
      "Pertama, kemudian, akhirnya",
      "Meskipun, walaupun, tetapi"
    ],
    ans: 1
  },
  // No.5 – Struktur teks ulasan/tanggapan
  {
    topic: "Teks Ulasan",
    q: "Urutan struktur teks ulasan yang benar adalah...",
    opts: [
      "Orientasi – Tafsiran – Evaluasi – Rangkuman",
      "Identifikasi – Deretan penjelas – Interpretasi",
      "Tesis – Argumen – Reiterasi",
      "Pembuka – Komplikasi – Resolusi"
    ],
    ans: 0
  },
  // No.6 – Teks eksplanasi: Cari judul di teks eksplanasi
  {
    topic: "Teks Eksplanasi",
    q: "Judul yang paling tepat untuk sebuah teks eksplanasi tentang proses terjadinya hujan adalah...",
    opts: [
      "Indahnya Hujan di Musim Semi",
      "Proses Terjadinya Hujan",
      "Kenangan Kehujanan di Jalan",
      "Hujan dalam Pandangan Puisi"
    ],
    ans: 1
  },
  // No.7 – Teks eksplanasi: Mengganti kalimat
  {
    topic: "Teks Eksplanasi",
    q: "Kalimat pengganti yang tepat dalam teks eksplanasi harus bersifat...",
    opts: [
      "Panjang dan menggunakan banyak kata kiasan",
      "Menggunakan bahasa sehari-hari yang santai",
      "Lugas, logis, dan menggunakan konjungsi yang tepat",
      "Emosional dan bersifat persuasif"
    ],
    ans: 2
  },
  // No.8 – Deretan penjelas: menjelaskan sebab-akibat; Pernyataan umum: menjelaskan terjadinya fenomena; Kesimpulan/penutup: inti pembahasan
  {
    topic: "Teks Eksplanasi",
    q: "Pada struktur teks eksplanasi, bagian yang menjelaskan sebab-akibat terjadinya fenomena secara urut disebut...",
    opts: [
      "Pernyataan umum",
      "Deretan penjelas",
      "Interpretasi",
      "Kesimpulan"
    ],
    ans: 1
  },
  // No.9 – Ciri kebahasaan: konjungsi kausalitas
  {
    topic: "Teks Eksplanasi",
    q: "Ciri kebahasaan teks eksplanasi adalah penggunaan konjungsi kausalitas. Manakah contoh konjungsi kausalitas?",
    opts: [
      "Dan, atau, serta",
      "Kemudian, lalu, setelah itu",
      "Karena, sehingga, oleh karena itu",
      "Meskipun, walaupun, padahal"
    ],
    ans: 2
  },
  // No.10 – Interpretasi
  {
    topic: "Teks Eksplanasi",
    q: "Bagian 'interpretasi' dalam teks eksplanasi berisi...",
    opts: [
      "Gambaran umum fenomena yang akan dibahas",
      "Rincian sebab-akibat terjadinya fenomena",
      "Kesimpulan atau komentar penulis terhadap fenomena",
      "Data statistik dan fakta pendukung"
    ],
    ans: 2
  },
  // No.11 – Mencari topik teks eksplanasi
  {
    topic: "Teks Eksplanasi",
    q: "Manakah topik yang paling tepat untuk teks eksplanasi?",
    opts: [
      "Pengalaman berlibur ke Bali",
      "Cara membuat kerajinan tangan dari bambu",
      "Proses terjadinya gempa bumi",
      "Resensi novel terbaru"
    ],
    ans: 2
  },
  // No.12 – Sifat eksplanasi: denotatif (makna yang sebenarnya) vs konotatif (makna tidak sebenarnya)
  {
    topic: "Teks Eksplanasi",
    q: "Teks eksplanasi bersifat denotatif. 'Denotatif' berarti menggunakan makna...",
    opts: [
      "Tidak sebenarnya atau kiasan",
      "Yang sebenarnya sesuai dengan makna dalam kamus",
      "Yang bergantung pada konteks pembicara",
      "Yang bersifat emosional"
    ],
    ans: 1
  },
  // No.13 – Sifat ilmiah: yang tidak bisa diubah → eksplanasi
  {
    topic: "Teks Eksplanasi",
    q: "Teks eksplanasi bersifat ilmiah karena mengandung fakta yang 'tidak bisa diubah'. Maksudnya adalah...",
    opts: [
      "Ditulis oleh ilmuwan ternama sehingga pasti benar",
      "Berdasarkan fakta yang dapat diverifikasi dan bersifat objektif",
      "Menggunakan bahasa yang sangat formal",
      "Tidak boleh dikritik oleh siapapun"
    ],
    ans: 1
  },
  // No.14 – Kalimat pasif
  {
    topic: "Teks Eksplanasi",
    q: "Kalimat pasif banyak digunakan dalam teks eksplanasi karena...",
    opts: [
      "Lebih mudah dipahami pembaca awam",
      "Lebih pendek dari kalimat aktif",
      "Menekankan proses atau peristiwa, bukan pelakunya",
      "Merupakan aturan wajib tata bahasa baku"
    ],
    ans: 2
  },
  // No.15 – Struktur eksplanasi (mengurutkan)
  {
    topic: "Teks Eksplanasi",
    q: "Urutan struktur teks eksplanasi yang benar adalah...",
    opts: [
      "Deretan penjelas – Pernyataan umum – Interpretasi",
      "Pernyataan umum – Deretan penjelas – Interpretasi",
      "Interpretasi – Pernyataan umum – Deretan penjelas",
      "Pernyataan umum – Interpretasi – Deretan penjelas"
    ],
    ans: 1
  },
  // No.16 – Konjungsi kausalitas: kode kata "kemudian, lalu" mencari dalam paragraf teks
  {
    topic: "Teks Eksplanasi",
    q: "Kata 'kemudian' dan 'lalu' dalam teks eksplanasi termasuk konjungsi jenis...",
    opts: [
      "Kausalitas",
      "Temporal",
      "Aditif",
      "Kontrastif"
    ],
    ans: 1
  },
  // No.17 – "Dipisahkan" termasuk konjungsi apa?
  {
    topic: "Teks Eksplanasi",
    q: "Kata 'dipisahkan' dalam kalimat 'Air dan minyak dipisahkan oleh perbedaan massa jenis' merupakan contoh...",
    opts: [
      "Kalimat aktif transitif",
      "Kalimat pasif",
      "Kalimat majemuk setara",
      "Kalimat imperatif"
    ],
    ans: 1
  },
  // No.18 – Mengartikan: atmosfer, refleksi, refraksi, dispersi
  {
    topic: "Teks Eksplanasi",
    q: "Dalam teks eksplanasi tentang pelangi, kata 'dispersi' berarti...",
    opts: [
      "Pemantulan cahaya oleh permukaan air",
      "Pembiasan cahaya saat melewati medium",
      "Penguraian cahaya menjadi berbagai spektrum warna",
      "Penyerapan cahaya oleh awan tebal"
    ],
    ans: 2
  },
  // No.19 – Kata 'akibat' menunjukkan konjungsi apa
  {
    topic: "Teks Eksplanasi",
    q: "Kata 'akibat' dalam teks eksplanasi menunjukkan konjungsi jenis...",
    opts: [
      "Temporal",
      "Kausalitas",
      "Aditif",
      "Pertentangan"
    ],
    ans: 1
  },
  // No.20 – Kata sifat: subjektif, material, teknis → yang digunakan dalam eksplanasi
  {
    topic: "Teks Eksplanasi",
    q: "Kata sifat yang lazim digunakan dalam teks eksplanasi adalah kata sifat yang bersifat...",
    opts: [
      "Subjektif dan emosional",
      "Material dan teknis",
      "Konotatif dan imajinatif",
      "Informal dan santai"
    ],
    ans: 1
  },
  // No.21 – Langkah-langkah membuat laporan percobaan
  {
    topic: "Teks Laporan",
    q: "Urutan langkah yang benar dalam membuat laporan percobaan adalah...",
    opts: [
      "Simpulan – Hasil – Prosedur – Alat/Bahan – Tujuan",
      "Tujuan – Alat/Bahan – Prosedur – Hasil – Simpulan",
      "Prosedur – Tujuan – Alat/Bahan – Hasil – Simpulan",
      "Hasil – Tujuan – Alat/Bahan – Prosedur – Simpulan"
    ],

let current = 0;
let score = 0;
let answered = [];
let userAnswers = [];
let shuffledQuestions = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  shuffledQuestions = shuffle(questions);
  current = 0; score = 0; answered = []; userAnswers = [];
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = shuffledQuestions[current];
  document.getElementById('qCounter').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressBar').style.width = `${((current + 1) / questions.length) * 100}%`;
  document.getElementById('scoreLive').textContent = `Skor: ${score}`;
  document.getElementById('topicTag').textContent = q.topic;
  document.getElementById('questionText').textContent = `${current + 1}. ${q.q}`;

  const letters = ['A', 'B', 'C', 'D'];
  const optDiv = document.getElementById('optionsDiv');
  optDiv.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optDiv.appendChild(btn);
  });

  const fb = document.getElementById('feedbackDiv');
  fb.className = 'feedback';
  fb.textContent = '';
  const btnNext = document.getElementById('btnNext');
  btnNext.className = 'btn-next';
  btnNext.textContent = current < questions.length - 1 ? 'Soal Berikutnya →' : 'Lihat Hasil 🏆';
}

function selectAnswer(idx) {
  const q = shuffledQuestions[current];
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => { o.classList.add('disabled'); o.onclick = null; });

  const fb = document.getElementById('feedbackDiv');
  const correct = q.ans;
  userAnswers[current] = idx;

  if (idx === correct) {
    score++;
    opts[idx].classList.add('correct');
    fb.className = 'feedback ok show';
    fb.textContent = '✅ Benar! Jawaban kamu tepat.';
  } else {
    opts[idx].classList.add('wrong');
    opts[correct].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.textContent = `❌ Salah. Jawaban yang benar: ${['A','B','C','D'][correct]}. ${q.opts[correct]}`;
  }

  document.getElementById('scoreLive').textContent = `Skor: ${score}`;
  document.getElementById('btnNext').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('result');
  res.style.display = 'block';

  const pct = Math.round((score / questions.length) * 100);
  const nilai = pct;

  document.getElementById('scoreFinal').textContent = `${score} / ${questions.length} benar`;
  document.getElementById('rCorrect').textContent = score;
  document.getElementById('rWrong').textContent = questions.length - score;
  document.getElementById('rPct').textContent = nilai;

  let grade = '';
  if (pct >= 90) grade = '🥇 A';
  else if (pct >= 80) grade = '🥈 B';
  else if (pct >= 70) grade = '🥉 C';
  else if (pct >= 60) grade = '📘 D';
  else grade = '📕 E';
  document.getElementById('gradeBadge').textContent = grade;

  // Review
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  shuffledQuestions.forEach((q, i) => {
    const ua = userAnswers[i];
    const correct = ua === q.ans;
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <div class="ri-q">${i+1}. ${q.q}</div>
      <div>Jawabanmu: <span class="${correct ? 'ri-correct' : 'ri-wrong'}">${ua !== undefined ? ['A','B','C','D'][ua] + '. ' + q.opts[ua] : 'Tidak dijawab'}</span></div>
      ${!correct ? `<div>Jawaban benar: <span class="ri-correct">${['A','B','C','D'][q.ans]}. ${q.opts[q.ans]}</span></div>` : ''}
    `;
    reviewList.appendChild(div);
  });
}

function restartQuiz() {
  shuffledQuestions = shuffle(questions);
  current = 0; score = 0; answered = []; userAnswers = [];
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion();
}
