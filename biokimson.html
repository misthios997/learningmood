<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Biologi & Kimia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --s1: #0d1424;
  --s2: #111827;
  --card: #131c2e;
  --border: #1e2d45;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --gold: #fbbf24;
  --green: #10b981;
  --red: #ef4444;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --bio: #10b981;
  --kim: #7c3aed;
  --tech: #f59e0b;
  --tanah: #a3663a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── PARTICLES ── */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:.15;animation:float linear infinite}
@keyframes float{from{transform:translateY(100vh) rotate(0deg)}to{transform:translateY(-100px) rotate(720deg)}}

/* ── INTRO ── */
#intro{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;z-index:1}
.warning-banner{
  background:linear-gradient(135deg,#1c1000,#2a1500);
  border:1.5px solid #fbbf2488;
  border-radius:.75rem;
  padding:.8rem 1.5rem;
  margin-bottom:2rem;
  font-size:.85rem;
  color:#fbbf24;
  font-weight:600;
  letter-spacing:.02em;
  max-width:480px;
  animation:pulse-border 2s infinite;
}
@keyframes pulse-border{0%,100%{border-color:#fbbf2488}50%{border-color:#fbbf24dd}}
.title-wrap{margin-bottom:1.5rem}
.title-wrap .sub{font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:.75rem;display:block}
.title-wrap h1{font-family:'Syne',sans-serif;font-size:clamp(3rem,10vw,6rem);font-weight:800;line-height:.95;background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pills{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
.pill{padding:.35rem .9rem;border-radius:99px;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid}
.pill.bio{background:#10b98122;border-color:#10b98166;color:#10b981}
.pill.kim{background:#7c3aed22;border-color:#7c3aed66;color:#a78bfa}
.pill.tech{background:#f59e0b22;border-color:#f59e0b66;color:#fbbf24}
.pill.tanah{background:#a3663a22;border-color:#a3663a66;color:#d4956a}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:360px;margin:0 auto 2.5rem}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1rem .5rem;text-align:center}
.stat-box .n{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-box .l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:.15rem}
.btn-start{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:1rem 3.5rem;font-size:1.05rem;font-weight:700;border-radius:99px;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.03em;transition:transform .2s,box-shadow .2s;box-shadow:0 0 40px #00d4ff44;position:relative;overflow:hidden}
.btn-start::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#ffffff22,transparent);opacity:0;transition:opacity .2s}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 0 60px #00d4ff66}
.btn-start:hover::before{opacity:1}

/* ── QUIZ ── */
#quiz{display:none;min-height:100vh;padding:1.2rem;position:relative;z-index:1}
.q-header{max-width:760px;margin:0 auto 1.2rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.q-num{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;white-space:nowrap}
.q-num span{color:var(--accent)}
.prog-wrap{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;min-width:80px;position:relative}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);position:relative}
.prog-fill::after{content:'';position:absolute;right:0;top:0;height:100%;width:20px;background:linear-gradient(90deg,transparent,#ffffff55);border-radius:99px}
.score-badge{background:var(--card);border:1px solid var(--border);border-radius:99px;padding:.3rem .8rem;font-size:.8rem;font-weight:600;color:var(--gold);white-space:nowrap}

.qcard{background:var(--card);border:1px solid var(--border);border-radius:1.4rem;padding:1.8rem;max-width:760px;margin:0 auto 1rem;animation:slideUp .3s ease both;position:relative;overflow:hidden}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.topic-chip{display:inline-flex;align-items:center;gap:.4rem;padding:.28rem .75rem;border-radius:99px;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.1rem;border:1.5px solid}
.topic-chip.bio{background:#10b98115;border-color:#10b98155;color:#10b981}
.topic-chip.kim{background:#7c3aed15;border-color:#7c3aed55;color:#a78bfa}
.topic-chip.tech{background:#f59e0b15;border-color:#f59e0b55;color:#fbbf24}
.topic-chip.tanah{background:#a3663a15;border-color:#a3663a55;color:#d4956a}

.q-text{font-size:1rem;line-height:1.75;font-weight:500;margin-bottom:1.3rem;color:var(--text)}
.opts{display:flex;flex-direction:column;gap:.65rem}
.opt{display:flex;align-items:flex-start;gap:.85rem;background:var(--s2);border:2px solid var(--border);border-radius:.9rem;padding:.85rem 1rem;cursor:pointer;transition:all .15s;font-size:.92rem;line-height:1.55;text-align:left;color:#fff!important;-webkit-text-fill-color:#fff!important;font-family:'Inter',sans-serif;width:100%}
.opt:hover:not(.locked){border-color:var(--accent);background:#0d1f33;transform:translateX(3px)}
.letter-badge{min-width:1.8rem;height:1.8rem;border-radius:.45rem;background:#1e2d45;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;flex-shrink:0;color:#94a3b8!important;-webkit-text-fill-color:#94a3b8!important;transition:all .15s;font-family:'Syne',sans-serif}
.opt-text{color:#fff!important;-webkit-text-fill-color:#fff!important;flex:1}
.opt.chosen{border-color:var(--accent);background:#0a2040}
.opt.chosen .letter-badge{background:var(--accent);color:#000!important;-webkit-text-fill-color:#000!important}
.opt.correct-ans{border-color:var(--green);background:#052018}
.opt.correct-ans .letter-badge{background:var(--green);color:#000!important;-webkit-text-fill-color:#000!important}
.opt.wrong-ans{border-color:var(--red);background:#200505}
.opt.wrong-ans .letter-badge{background:var(--red);color:#fff!important;-webkit-text-fill-color:#fff!important}
.opt.locked{cursor:default}

.explain-box{margin-top:1rem;border-radius:.9rem;padding:1rem 1.1rem;font-size:.88rem;line-height:1.65;display:none;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.explain-box.show{display:block}
.explain-box.ok{background:#052018;border:1.5px solid #10b98155;color:#6ee7b7}
.explain-box.bad{background:#200510;border:1.5px solid #ef444455;color:#fca5a5}
.explain-box .ex-title{font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}

.btn-next{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.8rem 2.2rem;font-size:.95rem;font-weight:700;border-radius:99px;cursor:pointer;font-family:'Inter',sans-serif;margin:0 auto;display:none;transition:transform .2s,box-shadow .2s;box-shadow:0 0 24px #00d4ff33}
.btn-next.show{display:block}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 0 40px #00d4ff55}
.btn-wrap{max-width:760px;margin:.8rem auto 0;text-align:right}

/* ── RESULT ── */
#result{display:none;min-height:100vh;padding:2rem 1.2rem;text-align:center;position:relative;z-index:1}
.result-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,#00d4ff22 0%,transparent 70%);pointer-events:none}
#result h2{font-family:'Syne',sans-serif;font-size:clamp(2rem,8vw,4.5rem);font-weight:800;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.grade-ring{width:140px;height:140px;border-radius:50%;margin:1.5rem auto;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:3.5rem;font-weight:800;border:4px solid;position:relative}
.grade-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid;opacity:.3;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.grade-A{border-color:var(--gold);color:var(--gold)}
.grade-A::before{border-color:var(--gold)}
.grade-B{border-color:var(--green);color:var(--green)}
.grade-B::before{border-color:var(--green)}
.grade-C{border-color:var(--accent);color:var(--accent)}
.grade-C::before{border-color:var(--accent)}
.grade-D{border-color:var(--red);color:var(--red)}
.grade-D::before{border-color:var(--red)}
.score-text{font-size:1.2rem;color:var(--muted);margin-bottom:1.5rem}
.score-text strong{color:var(--text);font-size:1.5rem}
.r-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:420px;margin:0 auto 2rem}
.r-box{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.1rem .5rem}
.r-box .rn{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800}
.r-box .rl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.review-wrap{max-width:760px;margin:0 auto;text-align:left}
.review-wrap h3{font-family:'Syne',sans-serif;font-size:1.3rem;color:var(--accent);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.rv-item{background:var(--card);border:1px solid var(--border);border-radius:.9rem;padding:1rem 1.1rem;margin-bottom:.7rem;font-size:.85rem;line-height:1.6}
.rv-q{font-weight:600;color:var(--text);margin-bottom:.4rem}
.rv-correct{color:var(--green)}
.rv-wrong{color:var(--red)}
.rv-explain{color:var(--muted);margin-top:.35rem;font-size:.8rem;border-top:1px solid var(--border);padding-top:.35rem}
.btn-restart{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.9rem 2.5rem;font-size:1rem;font-weight:700;border-radius:99px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:2rem 0 3rem;transition:transform .2s;box-shadow:0 0 30px #00d4ff33}
.btn-restart:hover{transform:translateY(-2px)}

/* ── MUSIC ── */
#mp{position:fixed;bottom:1rem;right:1rem;z-index:9999;background:#0d1424f5;border:1.5px solid #00d4ff33;border-radius:1rem;padding:.6rem .9rem;backdrop-filter:blur(16px);min-width:190px;box-shadow:0 4px 32px #0008}
#mp-song{font-size:.75rem;color:var(--accent);font-weight:700;margin-bottom:.45rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;display:flex;align-items:center;gap:.4rem}
#mp-note{display:inline-block;font-size:.95rem}
#mp-note.on{animation:nb .5s infinite alternate}
@keyframes nb{from{transform:translateY(0)}to{transform:translateY(-4px)}}
#mp-ctrl{display:flex;gap:.35rem}
.mb{flex:1;background:#1e2d45;border:1px solid #2d3f58;color:#fff;border-radius:.45rem;padding:.3rem 0;cursor:pointer;font-size:.85rem;transition:all .15s;line-height:1}
.mb:hover{background:var(--accent);color:#000;border-color:var(--accent)}

/* extra music player styles */
#mp { min-width: 220px; }
#mp-playlist::-webkit-scrollbar { width: 4px; }
#mp-playlist::-webkit-scrollbar-track { background: transparent; }
#mp-playlist::-webkit-scrollbar-thumb { background: #2d3f58; border-radius: 4px; }
.pl-item {
  display: flex; align-items: center; gap: .4rem;
  padding: .3rem .4rem; border-radius: .4rem; cursor: pointer;
  font-size: .72rem; color: #94a3b8; transition: all .15s;
  border: 1px solid transparent;
}
.pl-item:hover { background: #1e2d45; color: #e2e8f0; }
.pl-item.active { background: #0a2040; border-color: #00d4ff44; color: #00d4ff; }
.pl-item .pl-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pl-item .pl-del { opacity: 0; font-size: .75rem; color: #ef4444; padding: 0 .2rem; flex-shrink:0; }
.pl-item:hover .pl-del { opacity: 1; }
.pl-item .pl-idx { min-width: 1.2rem; font-size: .65rem; color: #4a5568; text-align:right; flex-shrink:0; }

</style>
<script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
</head>
<body>

<!-- Particles -->
<div id="particles"></div>

<!-- INTRO -->
<div id="intro">
  <div class="warning-banner">
    ⚠️ Ga yakin bakal masuk pas ujian 💀
  </div>
  <div class="title-wrap">
    <span class="sub">📚 Latihan Soal PAT SMP</span>
    <h1>BIOLOGI<br>&amp; KIMIA</h1>
  </div>
  <div class="pills">
    <span class="pill bio">🧬 Bioteknologi</span>
    <span class="pill tanah">🌱 Tanah</span>
    <span class="pill tech">⚡ Teknologi</span>
    <span class="pill kim">⚛️ Kimia Atom</span>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="n">80</div><div class="l">Soal</div></div>
    <div class="stat-box"><div class="n">4</div><div class="l">Topik</div></div>
    <div class="stat-box"><div class="n">🔀</div><div class="l">Acak</div></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Mulai Kuis ▶</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="q-header">
    <div class="q-num">Soal <span id="qNum">1</span> / <span id="qTotal">85</span></div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:1%"></div></div>
    <div class="score-badge">⭐ <span id="scoreLive">0</span></div>
  </div>
  <div class="qcard" id="qCard">
    <div class="topic-chip bio" id="topicChip"></div>
    <div class="q-text" id="qText"></div>
    <div class="opts" id="optsDiv"></div>
    <div class="explain-box" id="explainBox"></div>
  </div>
  <div class="btn-wrap">
    <button class="btn-next" id="btnNext" onclick="nextQ()">Lanjut →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="result-glow"></div>
  <h2>Hasil Kuis</h2>
  <div class="grade-ring grade-A" id="gradeRing"></div>
  <div class="score-text">Kamu benar <strong id="scoreStr"></strong> soal</div>
  <div class="r-grid">
    <div class="r-box"><div class="rn" id="rC" style="color:var(--green)"></div><div class="rl">Benar</div></div>
    <div class="r-box"><div class="rn" id="rW" style="color:var(--red)"></div><div class="rl">Salah</div></div>
    <div class="r-box"><div class="rn" id="rP" style="color:var(--gold)"></div><div class="rl">Nilai</div></div>
  </div>
  <div class="review-wrap">
    <h3>📋 Review Jawaban</h3>
    <div id="reviewList"></div>
  </div>
  <div style="text-align:center">
    <button class="btn-restart" onclick="restart()">🔄 Ulangi Kuis</button>
  </div>
</div>

<!-- MUSIC PLAYER -->
<input type="file" id="fileInput" accept="audio/*" multiple style="display:none" onchange="handleFiles(event)">

<div id="mp">
  <div id="mp-song"><span id="mp-note">♪</span><span id="mp-name">— No Music —</span></div>
  <div id="mp-ctrl">
    <button class="mb" onclick="prevS()" title="Sebelumnya">⏮</button>
    <button class="mb" id="mb-play" onclick="togPlay()" title="Play/Pause">▶</button>
    <button class="mb" onclick="nextS()" title="Berikutnya">⏭</button>
    <button class="mb" id="mb-mute" onclick="togMute()" title="Mute">🔊</button>
    <button class="mb" onclick="document.getElementById('fileInput').click()" title="Tambah Lagu" style="background:#7c3aed33;border-color:#7c3aed88;color:#a78bfa">＋</button>
  </div>
  <!-- Playlist -->
  <div id="mp-playlist" style="display:none;margin-top:.5rem;max-height:160px;overflow-y:auto;border-top:1px solid #1e2d45;padding-top:.4rem"></div>
  <div id="mp-footer" style="display:flex;justify-content:space-between;align-items:center;margin-top:.4rem">
    <button class="mb" onclick="togPlaylist()" id="mb-pl" style="font-size:.7rem;padding:.25rem .5rem;flex:1;margin-right:.3rem">🎵 Playlist</button>
    <button class="mb" onclick="clearAll()" style="font-size:.7rem;padding:.25rem .5rem;background:#ef444422;border-color:#ef444466;color:#fca5a5">🗑</button>
  </div>
</div>
<audio id="bgAudio" loop></audio>

<script>
// ── PARTICLES ──
(function(){
  const p=document.getElementById('particles');
  const colors=['#00d4ff','#7c3aed','#10b981','#fbbf24'];
  for(let i=0;i<18;i++){
    const d=document.createElement('div');
    d.className='particle';
    const size=Math.random()*6+3;
    d.style.cssText=`width:${size}px;height:${size}px;background:${colors[i%4]};left:${Math.random()*100}%;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s`;
    p.appendChild(d);
  }
})();

// ── TOPIC STYLES ──
const topicStyle={
  'Bioteknologi':'bio','Bioteknologi Konvensional vs Modern':'bio',
  'Tanah':'tanah','Teknologi Ramah Lingkungan':'tech',
  'Kimia Atom':'kim'
};
function chipClass(t){
  for(const k in topicStyle) if(t.includes(k.split(' ')[0])) return topicStyle[k];
  return 'bio';
}

// ── QUESTIONS ──
const questions=[
  // ═══════ BIOTEKNOLOGI ═══════
  {t:'Bioteknologi',q:'Berikut ini ilmu-ilmu yang mendukung penerapan bioteknologi, <b>kecuali</b>....',o:['Biokimia','Genetika','Fisika','Kimia'],a:2,ex:'Bioteknologi didukung oleh Biokimia, Genetika, dan Kimia. Fisika bukan ilmu utama pendukung bioteknologi.'},
  {t:'Bioteknologi',q:'Dari produk berikut: (1) Tempe (2) Tahu (3) Bir (4) Sirup (5) Kecap — yang memanfaatkan mikroorganisme adalah....',o:['1, 2, dan 3','1, 2, dan 5','2, 3, dan 5','3, 4, dan 6'],a:1,ex:'Tempe (Rhizopus), Bir (Saccharomyces), dan Kecap (Aspergillus) dibuat dengan bantuan mikroorganisme. Tahu dan Sirup tidak menggunakan mikroorganisme.'},
  {t:'Bioteknologi',q:'Produk bioteknologi asli Indonesia, <b>kecuali</b>....',o:['Tahu','Tempe','Kecap','Roti'],a:3,ex:'Tahu, Tempe, dan Kecap adalah produk fermentasi asli Indonesia. Roti berasal dari tradisi Eropa/Timur Tengah.'},
  {t:'Bioteknologi',q:'Mikroorganisme yang digunakan untuk membuat tempe adalah....',o:['Saccharomyces cereviceae','Acetobacter xylinum','Neurospora crassa','Rhizopus oligosporus'],a:3,ex:'Tempe dibuat dengan bantuan jamur Rhizopus oligosporus yang memfermentasi kedelai sehingga lebih mudah dicerna.'},
  {t:'Bioteknologi',q:'Keunggulan tempe kedelai dibanding kedelai mentah adalah....',o:['Menghasilkan energi lebih tinggi','Mudah dicerna','Kadar protein lebih tinggi','Lebih murah'],a:1,ex:'Fermentasi oleh Rhizopus memecah protein dan serat kedelai sehingga tempe jauh lebih mudah dicerna oleh tubuh.'},
  {t:'Bioteknologi',q:'Urutan yang benar dalam proses pembuatan tempe adalah: (1) Pencucian (2) Perebusan (3) Penirisan (4) Peragian (5) Pemeraman....',o:['1-2-3-4-5','1-3-2-4-5','2-1-3-4-5','5-4-3-1-2'],a:0,ex:'Kedelai dicuci → direbus → ditiriskan → diberi ragi (peragian) → diperam. Urutan 1-2-3-4-5 adalah yang paling benar.'},
  {t:'Bioteknologi',q:'Dalam proses pembuatan tempe, agar kulit kedelai mudah lepas, dilakukan....',o:['Perebusan','Perendaman','Penjemuran','Peragian'],a:1,ex:'Perendaman dalam air membuat kulit kedelai mengembang dan lunak sehingga mudah dilepas sebelum proses fermentasi.'},
  {t:'Bioteknologi',q:'Dalam proses pemeraman tempe, suhu yang sesuai adalah....',o:['30°C','32°C','34°C','35°C'],a:0,ex:'Suhu optimal untuk pertumbuhan Rhizopus oligosporus dalam pemeraman tempe adalah sekitar 30°C.'},
  {t:'Bioteknologi',q:'Mikroorganisme yang digunakan untuk membuat tape adalah....',o:['Saccharomyces cereviceae','Rhizopus oryzae','Neurospora crassa','Acetobacter xylinum'],a:0,ex:'Saccharomyces cerevisiae adalah ragi yang memfermentasi gula menjadi alkohol dalam pembuatan tape.'},
  {t:'Bioteknologi',q:'Kadar alkohol yang dihasilkan dari proses fermentasi tape adalah....',o:['5-10%','12-15%','30-50%','Lebih dari 75%'],a:0,ex:'Fermentasi tape menghasilkan kadar alkohol yang relatif rendah, sekitar 5-10%, karena proses fermentasinya tidak berlangsung lama.'},
  {t:'Bioteknologi',q:'Bahan untuk membuat brem padat adalah....',o:['Tape singkong','Tape ketan','Anggur','Bir hitam'],a:1,ex:'Brem padat (khas Madiun) dibuat dari sari tape ketan yang diuapkan dan dipadatkan.'},
  {t:'Bioteknologi',q:'Penggunaan makhluk hidup dalam bioteknologi, <b>kecuali</b>....',o:['Mudah bereproduksi','Produk yang dihasilkan bervariasi','Dapat dikloning','Mudah diperoleh'],a:1,ex:'Salah satu kelebihan makhluk hidup dalam bioteknologi adalah produk yang dihasilkan KONSISTEN, bukan bervariasi.'},
  {t:'Bioteknologi',q:'Ciri bioteknologi konvensional dari: (1) Perbaikan genetik tidak terarah (2) Hasil tidak dapat diperkirakan (3) Memerlukan waktu relatif lama (4) Pengaruh jangka panjang belum diketahui (5) Memerlukan teknologi canggih — ditunjukkan oleh....',o:['1, 2, dan 3','1, 3, dan 5','2, 3, dan 4','2, 4, dan 5'],a:0,ex:'Bioteknologi konvensional: perbaikan tidak terarah, hasil sulit diprediksi, membutuhkan waktu lama. Teknologi canggih dan pengaruh jangka panjang adalah ciri modern.'},
  {t:'Bioteknologi',q:'Kloning dilakukan dengan cara....',o:['Menggabungkan dua sel dari jaringan berbeda dengan listrik','Menyisipkan gen asing ke organisme','Menumbuhkan jaringan dalam media buatan','Memasukkan inti sel donor ke sel telur yang telah dihilangkan inti selnya'],a:3,ex:'Kloning transfer inti: inti sel somatic donor dimasukkan ke dalam sel telur yang telah dihilangkan intinya, lalu ditumbuhkan.'},
  {t:'Bioteknologi',q:'Dalam teknik kultur jaringan, bagian tumbuhan yang ditumbuhkan dalam media kultur dinamakan....',o:['Kalus','Eksplan','Planlet','Jaringan'],a:1,ex:'Eksplan adalah bagian kecil tumbuhan (sel, jaringan, atau organ) yang diambil dan ditumbuhkan dalam media kultur jaringan.'},
  {t:'Bioteknologi',q:'Prinsip pembuatan vaksin dengan teknologi DNA rekombinan adalah....',o:['Mengisolasi gen pengkode antigen dari mikrob untuk dilemahkan','Mensterilkan gen pengkode antigen pada sel mikrob','Memotong gen pengkode antigen untuk digabung dengan sel tubuh','Menyimpan sel inti tubuh dengan sel pengode patogen'],a:0,ex:'Teknologi DNA rekombinan mengisolasi gen yang mengkode antigen, lalu mengekspresikannya untuk menghasilkan antigen murni sebagai vaksin.'},
  {t:'Bioteknologi',q:'Urutan perkembangan tanaman dalam kultur jaringan secara berurutan adalah....',o:['Kalus → Plantlet → Eksplan','Eksplan → Plantlet → Kalus','Eksplan → Kalus → Plantlet','Plantlet → Kalus → Eksplan'],a:2,ex:'Eksplan (potongan tumbuhan) → dikultur → membentuk Kalus (massa sel) → berkembang menjadi Plantlet (tanaman kecil).'},
  {t:'Bioteknologi',q:'Bioteknologi konvensional berbeda dengan modern karena bioteknologi konvensional....',o:['Berkembang sejak ditemukannya DNA','Menerapkan prinsip rekayasa genetika','Menggunakan berbagai teknologi canggih','Menggunakan secara langsung hasil fermentasi mikroorganisme'],a:3,ex:'Bioteknologi konvensional memanfaatkan proses fermentasi alami mikroorganisme secara langsung, tanpa memanipulasi gen.'},
  {t:'Bioteknologi',q:'Prinsip bioteknologi modern dari: (1) Fermentasi (2) Memanfaatkan mikroorganisme langsung (3) Menghasilkan organisme sifat baru (4) Memanipulasi susunan gen (5) Kondisi steril — ditunjukkan nomor....',o:['1 dan 2','2 dan 3','2 dan 4','3 dan 4'],a:3,ex:'Prinsip utama bioteknologi modern adalah manipulasi gen (rekayasa genetika) sehingga menghasilkan organisme dengan sifat baru yang diinginkan.'},
  {t:'Bioteknologi',q:'Yang bukan alasan pemanfaatan makhluk hidup dalam bioteknologi adalah....',o:['Dapat berkembangbiak','Sudah tersedia di alam','Tidak dapat diubah sifatnya','Dapat menghasilkan produk'],a:2,ex:'Makhluk hidup justru DAPAT diubah sifatnya melalui rekayasa genetika. Inilah salah satu keunggulan utama bioteknologi modern.'},
  {t:'Bioteknologi',q:'Contoh bioteknologi yang memerlukan kondisi steril adalah....',o:['Pembuatan antibiotik','Pembuatan kompos','Pengolahan limbah','Pembuatan etanol'],a:0,ex:'Pembuatan antibiotik memerlukan kondisi steril agar tidak terkontaminasi mikroorganisme lain yang dapat mengganggu proses produksi.'},
  {t:'Bioteknologi',q:'Produksi yang menerapkan bioteknologi konvensional dari: (1) Alkohol-Saccharomyces (2) Hormon-E.coli (3) Nata de coco-Acetobacter (4) Pemisahan logam-Thiobacillus (5) Tanaman anti hama-B.thuringiensis....',o:['1, 2, dan 3','1, 3, dan 4','1, 4, dan 5','2, 3, dan 4'],a:1,ex:'Bioteknologi konvensional: alkohol (Saccharomyces), nata de coco (Acetobacter), dan pemisahan logam (Thiobacillus) tidak memerlukan rekayasa gen.'},
  {t:'Bioteknologi',q:'Pasangan yang benar antara produk dan mikroorganisme adalah....',o:['Tauco – Aspergillus oryzae','Kecap – Rhizopus oligosporus','Yoghurt – Acetobacter xylinum','Keju – Saccharomyces cerevisiae'],a:0,ex:'Tauco dibuat dari fermentasi kedelai oleh Aspergillus oryzae. Kecap menggunakan Aspergillus sojae, Yoghurt menggunakan Lactobacillus.'},
  {t:'Bioteknologi',q:'Bioteknologi yang dapat menghasilkan tanaman tahan hama dan penyakit untuk perkebunan adalah....',o:['Kultur jaringan','Kloning embrio','Teknik hibridoma','Tanaman transgenik'],a:3,ex:'Tanaman transgenik dibuat dengan menyisipkan gen penghasil racun (dari B. thuringiensis) ke dalam tanaman sehingga tahan terhadap hama.'},
  {t:'Bioteknologi',q:'Penggunaan plasmid sering dilakukan pada rekayasa genetika karena....',o:['Tidak dapat bereplikasi','Merupakan rangkaian RNA','Terikat pada kromosom inti bakteri','Dapat diturunkan pada sel keturunannya'],a:3,ex:'Plasmid adalah DNA sirkular di luar kromosom bakteri yang dapat bereplikasi dan diwariskan ke sel keturunan, sangat cocok sebagai vektor rekayasa genetika.'},
  {t:'Bioteknologi',q:'Pembuatan antibodi monoklonal didasarkan pada....',o:['Kemampuan setiap sel untuk memperbanyak diri','Kemampuan hewan percobaan menghasilkan antibodi','Cepatnya mikroorganisme berkembang biak','Peleburan sel mieloma dan sel limfosit B untuk menghasilkan hibridoma'],a:3,ex:'Teknik hibridoma: sel limfosit B (penghasil antibodi) + sel mieloma (sel kanker yang dapat membelah terus) → hibridoma → menghasilkan antibodi monoklonal.'},
  {t:'Bioteknologi',q:'Urutan proses kloning transfer inti pada domba dari: (1) Morula ditanam ke rahim (2) Inti sel somatik dimasukkan ke sel telur (3) Sel somatik diambil inti selnya (4) Inti sel telur dirusak UV (5) Sel telur membelah → morula (6) Bayi domba dilahirkan....',o:['1-3-2-6-4-5','3-2-4-5-1-6','3-4-2-1-5-6','4-3-2-5-1-6'],a:3,ex:'Urutan: Inti sel telur dirusak UV (4) → Inti sel somatik diambil (3) → Inti dimasukkan ke sel telur (2) → Sel membelah jadi morula (5) → Ditanam ke rahim (1) → Bayi lahir (6).'},
  {t:'Bioteknologi',q:'Prinsip dasar kultur jaringan tanaman wortel adalah....',o:['Menyiapkan gen yang diisolasi ke dalam sel tanaman','Mengkulturkan sel wortel dan mencangkokkan ke tanaman','Mengkulturkan eksplan tanaman wortel secara in vitro dan aseptis','Memfusikan dua protoplasma sel tanaman wortel'],a:2,ex:'Kultur jaringan bekerja berdasarkan totipotensi sel – setiap sel dapat berkembang menjadi organisme lengkap jika dikultur secara in vitro dalam kondisi aseptis.'},
  {t:'Bioteknologi',q:'Urutan proses kultur jaringan yang paling benar dari: (1) Eksplan dari jaringan muda (2) Eksplan diletakkan pada medium (3) Dicuci alkohol 70% (4) Sel kalus dipisahkan dan dikultur (5) Planlet ditanam hidroponik (6) Pemberian hormon sitokinin....',o:['1-2-3-4-5-6','1-3-2-6-4-5','2-1-3-4-5-6','3-2-1-6-4-5'],a:1,ex:'Ambil eksplan → sterilkan dengan alkohol → tanam di medium → beri hormon sitokinin → kalus terbentuk dan dipisahkan → planlet ditanam secara hidroponik.'},
  {t:'Bioteknologi',q:'Dari tabel: (1) Kedelai-Rhizopus-Kecap (2) Kedelai-Aspergillus-Tempe (3) Susu-Streptococcus-Yoghurt (4) Susu-Lactobacillus-Keju (5) Singkong-Saccharomyces-Tapai — hubungan yang BENAR adalah....',o:['1 dan 2','1 dan 3','2 dan 4','3 dan 5'],a:3,ex:'Yang benar: Susu + Streptococcus thermophilus/Lactobacillus → Yoghurt; Singkong + Saccharomyces cerevisiae → Tapai. Rhizopus sp. → Tempe (bukan kecap).'},

  // ═══════ TANAH ═══════
  {t:'Tanah',q:'Yang <b>bukan</b> merupakan peran tanah bagi kehidupan adalah....',o:['Penyedia air dan mineral','Menjaga suhu bumi','Tempat hidup organisme tanah','Menyediakan nutrisi bagi tumbuhan'],a:1,ex:'Tanah berfungsi menyediakan air, mineral, dan nutrisi, serta menjadi habitat organisme. Menjaga suhu bumi adalah fungsi ATMOSFER, bukan tanah.'},
  {t:'Tanah',q:'Dari pengamatan: A=Pasir, B=Lempung, C=Liat, D=Lempung berpasir. Lokasi yang terdapat organisme tanahnya adalah....',o:['A dan B','A dan D','C dan D','B dan D'],a:3,ex:'Organisme tanah hidup di tanah lempung (B) dan lempung berpasir (D) karena memiliki kelembapan, nutrisi, dan aerasi yang cukup. Tanah pasir terlalu kering, tanah liat terlalu padat.'},
  {t:'Tanah',q:'Kemungkinan yang terjadi akibat penggalian tanah dalam bagi keseimbangan lingkungan adalah....',o:['Meningkatkan pendapatan penduduk','Mengurangi jumlah mineral dalam tanah','Mengganggu kehidupan organisme tanah pada lapisan paling atas','Mempercepat pelapukan secara fisika dan kimiawi'],a:1,ex:'Penggalian tanah dalam (untuk tambang) mengangkat lapisan dalam ke permukaan dan menguras mineral dari dalam tanah, mengganggu keseimbangan ekosistem.'},
  {t:'Tanah',q:'Lapisan yang mengandung paling banyak materi organik adalah....',o:['Lapisan A','Lapisan B','Lapisan C','Lapisan D'],a:0,ex:'Lapisan A (topsoil/tanah atas) adalah lapisan yang paling kaya bahan organik karena mengandung sisa-sisa tumbuhan dan hewan yang terurai.'},
  {t:'Tanah',q:'Tanah dari daerah yang paling banyak terkikis oleh hujan dan air adalah....',o:['Daerah miring dengan semak-semak','Daerah datar dengan rerumputan','Daerah datar yang tandus','Daerah miring yang tandus'],a:3,ex:'Daerah miring + tandus (tanpa vegetasi) paling rentan erosi. Kemiringan mempercepat aliran air, dan tanpa akar tanaman tidak ada yang menahan tanah.'},
  {t:'Tanah',q:'Perubahan tanah yang terjadi akibat proses alam adalah....',o:['Degradasi nutrisi akibat pestisida','Pembentukan gurun akibat penebangan pohon','Banjir akibat pembangunan bendungan','Pengikisan nutrisi akibat hujan lebat'],a:3,ex:'Hujan lebat adalah proses alam. Pengikisan nutrisi oleh hujan merupakan perubahan tanah alami. Pestisida, penebangan, dan bendungan adalah akibat aktivitas manusia.'},
  {t:'Tanah',q:'Lokasi yang paling cepat pelapukan tanahnya adalah daerah....',o:['Gurun pasir yang sangat panas','Hutan tropis yang ditumbuhi bermacam tumbuhan','Padang rumput yang kering','Memiliki curah hujan tinggi'],a:1,ex:'Hutan tropis memiliki semua faktor pelapukan: fisika (suhu), kimia (hujan asam, air), dan biologi (akar tumbuhan, mikroorganisme). Kombinasi ini mempercepat pelapukan.'},
  {t:'Tanah',q:'Ion-ion dalam tanah yang dibutuhkan tumbuhan adalah....',o:['O₂ dan CO₂','Mg²⁺ dan NO₃⁻','SO₄²⁻ dan O₂','Mg²⁺ dan CO₂'],a:1,ex:'Tumbuhan menyerap mineral dari tanah dalam bentuk ion. Mg²⁺ (magnesium) dibutuhkan untuk klorofil, NO₃⁻ (nitrat) adalah sumber nitrogen untuk protein.'},
  {t:'Tanah',q:'Tanah dengan partikel sangat kecil, sulit ditembus air, dan tidak ada campuran pasir/batuan disebut....',o:['Tanah liat','Tanah liat berpasir','Tanah lempung','Tanah lempung berpasir'],a:0,ex:'Tanah liat memiliki partikel paling kecil dari semua jenis tanah, sehingga pori-porinya sangat kecil dan sulit ditembus air (impermeabel).'},
  {t:'Tanah',q:'Akibat utama erosi tanah adalah....',o:['Meningkatnya laju perpindahan mineral','Semakin banyaknya tumbuhan lapisan atas yang mati','Hilangnya lapisan tanah teratas sehingga mengganggu kehidupan organisme tanah','Berkurangnya kemampuan tanah menyerap air'],a:2,ex:'Erosi menghilangkan lapisan topsoil yang kaya nutrisi dan organisme. Ini mengganggu ekosistem tanah dan mengurangi kesuburan lahan.'},
  {t:'Tanah',q:'Proses pelapukan batuan menjadi tanah dipengaruhi oleh....',o:['Iklim dan organisme','Warna tanah','Jumlah bangunan','Plastik dan logam'],a:0,ex:'Pelapukan dipengaruhi oleh iklim (suhu, curah hujan) yang menyebabkan pelapukan fisika dan kimia, serta organisme (akar, mikroba) yang menyebabkan pelapukan biologi.'},
  {t:'Tanah',q:'Tanah berpasir mudah kehilangan air karena....',o:['Ukuran partikel besar dan pori-pori lebar','Mengandung banyak humus','Mengikat air sangat kuat','Struktur sangat padat'],a:0,ex:'Partikel pasir berukuran besar sehingga membentuk pori-pori yang lebar. Air mengalir bebas melewati pori besar ini tanpa tertahan, membuat tanah cepat kering.'},

  // ═══════ TEKNOLOGI RAMAH LINGKUNGAN ═══════
  {t:'Teknologi Ramah Lingkungan',q:'Sumber energi yang paling aman bagi lingkungan adalah....',o:['Minyak bumi','Batubara','Energi matahari','Nuklir'],a:2,ex:'Energi matahari adalah energi terbarukan yang tidak menghasilkan emisi gas rumah kaca, polusi udara, atau limbah berbahaya, sehingga paling aman bagi lingkungan.'},
  {t:'Teknologi Ramah Lingkungan',q:'Prinsip dasar pengolahan minyak mentah menjadi berbagai bahan bakar adalah....',o:['Pemanasan dan pemisahan berdasarkan titik didih','Penyaringan berdasarkan ukuran molekul','Penyaringan berdasarkan berat jenis','Pemisahan berdasar kelarutan'],a:0,ex:'Destilasi fraksional: minyak mentah dipanaskan, dan komponen-komponennya dipisahkan berdasarkan perbedaan titik didih (bensin, kerosin, solar, aspal).'},
  {t:'Teknologi Ramah Lingkungan',q:'Yang <b>bukan</b> dampak negatif pembakaran batubara yang tidak terkontrol adalah....',o:['Menghasilkan zat radioaktif','Menghasilkan gas natrium klorida','Menyebabkan gangguan pernapasan','Menyebabkan polusi udara'],a:1,ex:'Pembakaran batubara menghasilkan CO₂, SO₂, partikel debu, dan bahkan jejak radioaktif. Natrium klorida (garam dapur) TIDAK dihasilkan dari pembakaran batubara.'},
  {t:'Teknologi Ramah Lingkungan',q:'Teknologi yang memberikan kemudahan memenuhi kebutuhan manusia namun tetap menjaga kelestarian lingkungan disebut....',o:['Bioteknologi','Bioremediasi','Teknologi modern','Teknologi ramah lingkungan'],a:3,ex:'Teknologi ramah lingkungan adalah teknologi yang memenuhi kebutuhan manusia saat ini tanpa mengorbankan kemampuan generasi mendatang untuk memenuhi kebutuhannya.'},
  {t:'Teknologi Ramah Lingkungan',q:'Yang <b>bukan</b> prinsip teknologi yang menjaga kelestarian lingkungan adalah....',o:['Menjaga keberlangsungan lingkungan di masa depan','Memperhatikan keseimbangan lingkungan, sosial, dan ekonomi','Menggunakan bahan-bahan yang tidak dapat didaur ulang','Menggunakan sumber daya alam yang dapat diperbaharui'],a:2,ex:'Teknologi ramah lingkungan justru harus menggunakan bahan yang DAPAT didaur ulang. Penggunaan bahan tidak dapat didaur ulang bertentangan dengan prinsip keberlanjutan.'},
  {t:'Teknologi Ramah Lingkungan',q:'Contoh aplikasi teknologi ramah lingkungan dalam bidang energi, <b>kecuali</b>....',o:['Teknologi biofuel','Teknologi osmosis balik','Teknologi panel surya','Teknologi geotermal'],a:1,ex:'Osmosis balik adalah teknologi pengolahan AIR (desalinasi), bukan teknologi energi. Biofuel, panel surya, dan geotermal adalah teknologi energi terbarukan.'},
  {t:'Teknologi Ramah Lingkungan',q:'Teknologi penyediaan energi alternatif dari sumber daya alam tumbuh-tumbuhan disebut....',o:['Teknologi biofuel','Teknologi fuel cell','Teknologi biogas','Teknologi biopori'],a:0,ex:'Biofuel adalah bahan bakar yang dibuat dari biomasa tumbuhan (seperti jagung, tebu, atau jarak). Biogas berasal dari limbah organik/kotoran hewan.'},
  {t:'Teknologi Ramah Lingkungan',q:'Keunggulan panel surya untuk energi listrik, <b>kecuali</b>....',o:['Tidak menghasilkan emisi rumah kaca','Mudah dipasang dan dikembangkan','Panel surya dapat menghasilkan listrik meskipun di malam hari','Tidak menghasilkan gas SO₂'],a:2,ex:'Panel surya TIDAK bisa menghasilkan listrik di malam hari karena tidak ada sinar matahari. Ini adalah kelemahan utama panel surya.'},
  {t:'Teknologi Ramah Lingkungan',q:'Teknologi yang memanfaatkan panas lapisan dalam bumi untuk energi listrik adalah....',o:['Geoelektrik','Geopower','Geotermal','Geologi'],a:2,ex:'Geotermal (panas bumi) memanfaatkan uap air panas dari dalam bumi untuk menggerakkan turbin generator listrik. Indonesia kaya akan sumber geotermal.'},
  {t:'Teknologi Ramah Lingkungan',q:'Kendaraan yang paling ramah lingkungan adalah....',o:['Bus dengan mesin diesel','Bus dengan mesin motor listrik','Pesawat dengan bahan bakar avtur','Motor dengan bahan bakar minyak bumi'],a:1,ex:'Bus listrik tidak menghasilkan emisi gas buang langsung, jauh lebih ramah lingkungan dibanding kendaraan berbahan bakar fosil.'},
  {t:'Teknologi Ramah Lingkungan',q:'Perilaku bijaksana untuk menghemat energi bagi siswa antara lain....',o:['Berangkat sekolah lebih pagi agar terhindar kemacetan','Menggunakan air dengan shower dan kran otomatis','Menggunakan lampu belajar neon 100 watt agar lebih terang','Menyeterika baju setiap kali berangkat ke sekolah'],a:0,ex:'Berangkat lebih pagi menghindari kemacetan berarti mengurangi konsumsi bahan bakar kendaraan. Lampu 100W boros energi; shower otomatis dan seterika berulang juga boros.'},
  {t:'Teknologi Ramah Lingkungan',q:'Manfaat biopori bagi manusia adalah....',o:['Mencegah banjir dan penyebaran penyakit akibat genangan air','Menyuburkan tanah dan menambah sampah organik bagi tumbuhan','Menjaga kelestarian organisme tanah dan meningkatkan serangga vektor DBD','Menyimpan cadangan air dan meningkatkan mikroorganisme patogen'],a:0,ex:'Biopori mempercepat penyerapan air ke dalam tanah, mencegah genangan air dan banjir. Genangan air adalah tempat berkembangbiak nyamuk penyebab DBD.'},
  {t:'Teknologi Ramah Lingkungan',q:'Yang tidak termasuk cara menghemat energi pada AC dari: (1) Kapasitas AC sesuai luas ruangan (2) Menyalakan AC sesuai suhu yang dibutuhkan (3) Membuka semua pintu dan jendela saat AC menyala (4) Membersihkan AC berkala....',o:['1)','2)','3)','4)'],a:2,ex:'Membuka semua pintu dan jendela saat AC menyala justru BOROS energi karena udara dingin keluar dan AC harus bekerja lebih keras untuk mendinginkan ruangan.'},
  {t:'Teknologi Ramah Lingkungan',q:'Solusi mengatasi kemacetan demi manfaat jangka panjang dengan teknologi ramah lingkungan adalah....',o:['Biogas','Biopulping','Mobil listrik','Kendaraan berbahan bakar fosil'],a:2,ex:'Mobil listrik tidak menghasilkan emisi langsung, mengurangi polusi udara dari kemacetan, dan memanfaatkan energi terbarukan jika sumber listriknya ramah lingkungan.'},
  {t:'Teknologi Ramah Lingkungan',q:'Tujuan meletakkan batu pada lapisan teratas saat praktik penyaringan air adalah....',o:['Untuk menyaring partikel berukuran besar yang ada di air','Untuk menyaring partikel halus yang ada di air','Untuk menyerap bau tak sedap pada air','Untuk menjernihkan air'],a:0,ex:'Batu berfungsi sebagai filter pertama yang menyaring kotoran dan partikel berukuran besar. Lapisan berikutnya (pasir, karbon aktif) menyaring partikel yang lebih halus.'},

// ── ANSWERS from photo ──
// soal 1-85 jawaban dari foto: C C D D B A B C A A B B A D B B C D D C A A A D D D B C B D B D B A D D B B A C C A B D C B A C C B A A C C A B B C A A C B A D A B C A A C B A A B B B A
const photoAnswers=[2,2,3,3,1,0,1,2,0,0,1,1,0,3,1,0,2,3,3,2,0,0,0,3,3,3,1,2,1,3,1,3,1,0,3,3,1,1,0,2,2,0,1,3,2,1,0,2,2,1,0,0,2,2,0,1,1,2,0,0,2,1,0,3,0,1,2,0,0,2,1,0,0,1,1,1,0,3];
// Override with correct answers from photo for the 85 Qs

let shuffled=[],cur=0,score=0,uAns=[];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function startQuiz(){
  shuffled=shuffle(questions);
  cur=0;score=0;uAns=[];
  document.getElementById('intro').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('qTotal').textContent=shuffled.length;
  showQ();
}

function showQ(){
  const q=shuffled[cur];
  document.getElementById('qNum').textContent=cur+1;
  document.getElementById('progFill').style.width=`${((cur+1)/shuffled.length)*100}%`;
  document.getElementById('scoreLive').textContent=score;
  // Topic chip
  const chip=document.getElementById('topicChip');
  chip.textContent=q.t;
  chip.className='topic-chip '+getTopicClass(q.t);
  // Question
  document.getElementById('qText').innerHTML=q.q;
  // Options
  const od=document.getElementById('optsDiv');
  od.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="letter-badge">${l}</span><span class="opt-text">${q.o[i]}</span>`;
    btn.onclick=()=>pick(i);
    od.appendChild(btn);
  });
  // Reset
  const ex=document.getElementById('explainBox');
  ex.className='explain-box';
  ex.innerHTML='';
  const bn=document.getElementById('btnNext');
  bn.className='btn-next';
  bn.textContent=cur<shuffled.length-1?'Lanjut →':'Lihat Hasil 🏆';
}

function getTopicClass(t){
  if(t.includes('Tanah'))return'tanah';
  if(t.includes('Kimia'))return'kim';
  if(t.includes('Teknologi'))return'tech';
  return'bio';
}

function pick(idx){
  const q=shuffled[cur];
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>{o.classList.add('locked');o.onclick=null});
  uAns[cur]=idx;
  const correct=q.a;
  const ex=document.getElementById('explainBox');
  if(idx===correct){
    score++;
    opts[idx].classList.add('correct-ans');
    ex.innerHTML=`<div class="ex-title">✅ Benar!</div>${q.ex}`;
    ex.className='explain-box ok show';
  } else {
    opts[idx].classList.add('wrong-ans');
    opts[correct].classList.add('correct-ans');
    ex.innerHTML=`<div class="ex-title">❌ Salah — Jawaban benar: ${'ABCD'[correct]}</div>${q.ex}`;
    ex.className='explain-box bad show';
  }
  document.getElementById('scoreLive').textContent=score;
  document.getElementById('btnNext').classList.add('show');
}

function nextQ(){
  cur++;
  if(cur<shuffled.length)showQ();
  else showResult();
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  const res=document.getElementById('result');
  res.style.display='block';
  const pct=Math.round(score/shuffled.length*100);
  document.getElementById('scoreStr').textContent=`${score} / ${shuffled.length}`;
  document.getElementById('rC').textContent=score;
  document.getElementById('rW').textContent=shuffled.length-score;
  document.getElementById('rP').textContent=pct;
  const gr=document.getElementById('gradeRing');
  let g,gc;
  if(pct>=90){g='A+';gc='grade-A'}else if(pct>=80){g='A';gc='grade-A'}
  else if(pct>=70){g='B';gc='grade-B'}else if(pct>=60){g='C';gc='grade-C'}
  else{g='D';gc='grade-D'}
  gr.textContent=g;gr.className='grade-ring '+gc;
  // Review
  const rl=document.getElementById('reviewList');
  rl.innerHTML='';
  shuffled.forEach((q,i)=>{
    const ua=uAns[i];const ok=ua===q.a;
    const d=document.createElement('div');
    d.className='rv-item';
    d.innerHTML=`<div class="rv-q">${i+1}. ${q.q.replace(/<[^>]+>/g,'')}</div>
    <div>Jawabanmu: <span class="${ok?'rv-correct':'rv-wrong'}">${ua!==undefined?'ABCD'[ua]+'. '+q.o[ua]:'—'}</span></div>
    ${!ok?`<div>Benar: <span class="rv-correct">${'ABCD'[q.a]}. ${q.o[q.a]}</span></div>`:''}
    <div class="rv-explain">💡 ${q.ex}</div>`;
    rl.appendChild(d);
  });
}

function restart(){
  shuffled=shuffle(questions);
  cur=0;score=0;uAns=[];
  document.getElementById('result').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('qTotal').textContent=shuffled.length;
  showQ();
}

// ── MUSIC (IndexedDB + Dexie.js) ──
const builtinSongs=[
  {n:'— No Music —',s:'',id:'builtin-0'},
  {n:'🌿 Country Roads',s:'https://raw.githubusercontent.com/misthios997/marketsong/b3654ee4367a0060dcc77621d8ef9bfc2f0c3e3c/John%20Denver%20-%20Take%20Me%20Home%2C%20Country%20Roads%20(Official%20Audio).mp3',id:'builtin-1'},
  {n:'🍋 Lemon Tree',s:'https://raw.githubusercontent.com/misthios997/marketsong/b3654ee4367a0060dcc77621d8ef9bfc2f0c3e3c/lagu%20%20among%20%20%20us%20%20lemon%20%20tree%20%20(among%20%20us%20%20song).mp3',id:'builtin-2'},
];

// Dexie DB
const db = new Dexie('KuisMusic');
db.version(1).stores({ tracks: '++id, name' });

let allSongs = [...builtinSongs];
let si = 0, playing = false, objUrls = {};
const aud = document.getElementById('bgAudio');

// Load saved tracks from IndexedDB
async function loadDB() {
  try {
    const tracks = await db.tracks.toArray();
    for (const t of tracks) {
      const blob = t.blob;
      const url = URL.createObjectURL(blob);
      objUrls[t.id] = url;
      allSongs.push({ n: t.name, s: url, id: 'db-' + t.id, dbId: t.id });
    }
  } catch(e) { console.log('DB load error:', e); }
  renderPlaylist();
  mpUpdate();
}

// Handle file upload
async function handleFiles(e) {
  const files = Array.from(e.target.files);
  for (const file of files) {
    const name = file.name.replace(/\.[^.]+$/, '');
    const emoji = ['🎵','🎶','🎸','🎹','🥁','🎺','🎻'][Math.floor(Math.random()*7)];
    try {
      const dbId = await db.tracks.add({ name: emoji + ' ' + name, blob: file });
      const url = URL.createObjectURL(file);
      objUrls[dbId] = url;
      allSongs.push({ n: emoji + ' ' + name, s: url, id: 'db-' + dbId, dbId });
    } catch(err) { console.log('Save error:', err); }
  }
  e.target.value = '';
  renderPlaylist();
  // Auto play first uploaded
  if (files.length > 0) loadPlay(allSongs.length - files.length);
}

// Delete a custom track
async function deleteTrack(idx) {
  const song = allSongs[idx];
  if (!song.dbId) return;
  try {
    await db.tracks.delete(song.dbId);
    if (objUrls[song.dbId]) { URL.revokeObjectURL(objUrls[song.dbId]); delete objUrls[song.dbId]; }
    if (si === idx) { aud.pause(); playing = false; si = 0; }
    else if (si > idx) si--;
    allSongs.splice(idx, 1);
    renderPlaylist();
    mpUpdate();
  } catch(e) { console.log('Delete error:', e); }
}

async function clearAll() {
  const customs = allSongs.filter(s => s.dbId);
  if (!customs.length) return;
  if (!confirm('Hapus semua lagu custom?')) return;
  for (const s of customs) {
    await db.tracks.delete(s.dbId);
    if (objUrls[s.dbId]) { URL.revokeObjectURL(objUrls[s.dbId]); delete objUrls[s.dbId]; }
  }
  allSongs = [...builtinSongs];
  aud.pause(); playing = false; si = 0;
  renderPlaylist(); mpUpdate();
}

function renderPlaylist() {
  const pl = document.getElementById('mp-playlist');
  pl.innerHTML = '';
  allSongs.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'pl-item' + (i === si ? ' active' : '');
    row.innerHTML = `<span class="pl-idx">${i === si ? '▶' : i + 1}</span>
      <span class="pl-name">${s.n}</span>
      ${s.dbId ? `<span class="pl-del" onclick="event.stopPropagation();deleteTrack(${i})">✕</span>` : ''}`;
    row.onclick = () => loadPlay(i);
    pl.appendChild(row);
  });
}

let plOpen = false;
function togPlaylist() {
  plOpen = !plOpen;
  document.getElementById('mp-playlist').style.display = plOpen ? 'block' : 'none';
  document.getElementById('mb-pl').textContent = plOpen ? '▲ Playlist' : '🎵 Playlist';
}

function mpUpdate() {
  const s = allSongs[si] || allSongs[0];
  document.getElementById('mp-name').textContent = s ? s.n : '— No Music —';
  document.getElementById('mb-play').textContent = playing && s && s.s ? '⏸' : '▶';
  const note = document.getElementById('mp-note');
  playing && s && s.s ? note.classList.add('on') : note.classList.remove('on');
  renderPlaylist();
}

function loadPlay(i) {
  si = ((i % allSongs.length) + allSongs.length) % allSongs.length;
  const s = allSongs[si];
  if (!s || !s.s) { aud.pause(); aud.src = ''; playing = false; mpUpdate(); return; }
  aud.src = s.s;
  aud.loop = true;
  aud.play().then(() => { playing = true; mpUpdate(); }).catch(() => { playing = false; mpUpdate(); });
}

function togPlay() {
  if (!allSongs[si] || !allSongs[si].s) { loadPlay(1); return; }
  if (aud.paused) { aud.play().then(() => { playing = true; mpUpdate(); }); }
  else { aud.pause(); playing = false; mpUpdate(); }
}
function nextS() { loadPlay(si + 1); }
function prevS() { loadPlay(si - 1); }
function togMute() { aud.muted = !aud.muted; document.getElementById('mb-mute').textContent = aud.muted ? '🔇' : '🔊'; }

// Init
loadDB();
</script>
