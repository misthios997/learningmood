<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Bahasa Indonesia – Pidato</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #181c27;
    --card2: #1e2235;
    --accent: #e8c36a;
    --accent2: #c0392b;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --text: #eaf0fb;
    --muted: #8892aa;
    --border: #2a3050;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(232,195,106,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(192,57,43,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), #d4a843);
    color: #0f1117;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 100px;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* Progress */
  #progress-wrap {
    width: 100%;
    max-width: 700px;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  #progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  #progress-bar-bg {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #f0a04a);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* Card */
  .quiz-card {
    width: 100%;
    max-width: 700px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 36px 28px;
    position: relative;
    z-index: 1;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .q-number {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .q-text {
    font-size: 17px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
    font-weight: 400;
  }

  .q-passage {
    background: var(--card2);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.75;
    color: #bbc8e0;
    margin-bottom: 22px;
    font-style: italic;
  }

  .q-question {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 20px;
    line-height: 1.6;
    color: var(--text);
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    line-height: 1.55;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, transform 0.12s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(232,195,106,0.07);
    transform: translateX(3px);
  }

  .opt-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--border);
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0;
    transition: background 0.18s, color 0.18s;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .opt-btn.correct { border-color: var(--correct); background: rgba(39,174,96,0.12); }
  .opt-btn.correct .opt-letter { background: var(--correct); color: #fff; }
  .opt-btn.wrong { border-color: var(--wrong); background: rgba(231,76,60,0.10); }
  .opt-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }
  .opt-btn:disabled { cursor: default; }

  /* Feedback */
  #feedback {
    margin-top: 18px;
    padding: 13px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: none;
    line-height: 1.5;
  }
  #feedback.show { display: block; }
  #feedback.correct { background: rgba(39,174,96,0.13); color: #5dde8f; border: 1px solid rgba(39,174,96,0.3); }
  #feedback.wrong { background: rgba(231,76,60,0.12); color: #f08070; border: 1px solid rgba(231,76,60,0.25); }

  /* Nav */
  #nav {
    display: flex;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn-next {
    background: linear-gradient(135deg, var(--accent), #d4a843);
    color: #0f1117;
    border: none;
    border-radius: 10px;
    padding: 12px 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    letter-spacing: 0.5px;
    transition: opacity 0.15s, transform 0.12s;
  }
  .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-next.show { display: block; }

  /* Result */
  #result-screen {
    display: none;
    width: 100%;
    max-width: 700px;
    position: relative;
    z-index: 1;
  }
  #result-screen.show { display: block; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 36px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .result-emoji { font-size: 56px; margin-bottom: 18px; }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .result-score {
    font-size: 4rem;
    font-weight: 700;
    color: var(--text);
    margin: 14px 0;
    line-height: 1;
  }

  .result-score span { color: var(--muted); font-size: 2rem; }

  .result-msg {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .stat-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 36px;
  }

  .stat {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    min-width: 100px;
  }

  .stat-val {
    font-size: 1.8rem;
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
  }

  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }

  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .btn-restart {
    background: linear-gradient(135deg, var(--accent), #d4a843);
    color: #0f1117;
    border: none;
    border-radius: 10px;
    padding: 14px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s, transform 0.12s;
  }
  .btn-restart:hover { opacity: 0.88; transform: translateY(-2px); }

  /* Animations */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .quiz-card { animation: fadeSlideIn 0.4s ease both; }

  @media (max-width: 500px) {
    .quiz-card { padding: 24px 18px 20px; }
    .result-card { padding: 36px 20px 32px; }
    .stat-row { gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">Bahasa Indonesia</div>
  <h1>Kuis <span>Pidato</span></h1>
  <p class="subtitle">40 Soal Pilihan Ganda · Kelas 9</p>
</header>

<div id="progress-wrap">

<div class="quiz-card" id="quiz-card">

  <div class="options" id="options"></div>
  <div id="feedback"></div>
  <div id="nav"><button class="btn-next" id="btn-next">Selanjutnya →</button></div>
</div>

<div id="result-screen">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji">🎓</div>

    <div class="result-score" id="result-score">0 <span>/ 40</span></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="stat-row">
      <div class="stat">
        <span class="stat-val green" id="stat-benar">0</span>
        <span class="stat-label">Benar</span>
      </div>
      <div class="stat">
        <span class="stat-val red" id="stat-salah">0</span>
        <span class="stat-label">Salah</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-pct" style="color:var(--accent)">0%</span>
        <span class="stat-label">Skor</span>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">Ulangi Kuis</button>
  </div>
</div>

let current = 0;
let score = 0;
let answered = false;

function renderQuestion() {
  const q = questions[current];
  answered = false;

  document.getElementById('q-number').textContent = `Soal ${current + 1}`;
  document.getElementById('q-counter').textContent = `Soal ${current + 1} dari ${questions.length}`;
  document.getElementById('score-live').textContent = `Nilai: ${score}`;
  document.getElementById('progress-bar').style.width = `${(current / questions.length) * 100}%`;

  const passageEl = document.getElementById('q-passage');
  if (q.passage) {
    passageEl.style.display = 'block';
    passageEl.textContent = q.passage;
  } else {
    passageEl.style.display = 'none';
  }

  document.getElementById('q-question').textContent = q.question;

  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';

  const letters = ['A','B','C','D','E'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    optContainer.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = '';
  fb.textContent = '';

  document.getElementById('btn-next').classList.remove('show');

  // animate
  const card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeSlideIn 0.35s ease both';
}

function selectAnswer(idx, btnEl) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll('.opt-btn');
  buttons.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');

  if (idx === q.answer) {
    score++;
    btnEl.classList.add('correct');
    fb.textContent = '✓ Benar! Jawaban tepat.';
    fb.className = 'correct show';
  } else {
    btnEl.classList.add('wrong');
    buttons[q.answer].classList.add('correct');
    const letters = ['A','B','C','D','E'];
    fb.textContent = `✗ Kurang tepat. Jawaban yang benar: ${letters[q.answer]}. ${q.options[q.answer]}`;
    fb.className = 'wrong show';
  }

  document.getElementById('score-live').textContent = `Nilai: ${score}`;
  document.getElementById('btn-next').classList.add('show');
}

document.getElementById('btn-next').onclick = () => {
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';

  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('result-score').innerHTML = `${score} <span>/ ${questions.length}</span>`;
  document.getElementById('stat-benar').textContent = score;
  document.getElementById('stat-salah').textContent = questions.length - score;
  document.getElementById('stat-pct').textContent = pct + '%';

  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = 'Luar biasa! Kamu menguasai materi pidato dengan sangat baik!'; }
  else if (pct >= 75) { emoji = '🎓'; msg = 'Bagus! Pemahaman kamu tentang pidato sudah sangat baik.'; }
  else if (pct >= 60) { emoji = '📚'; msg = 'Cukup baik! Terus belajar untuk meningkatkan pemahamanmu.'; }
  else if (pct >= 40) { emoji = '💪'; msg = 'Masih perlu banyak belajar. Ulangi materi pidato dan coba lagi!'; }
  else { emoji = '📖'; msg = 'Jangan menyerah! Pelajari kembali materi tentang pidato.'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-msg').textContent = msg;
}

function restart() {
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('result-screen').classList.remove('show');
  renderQuestion();
}

renderQuestion();
</script>
