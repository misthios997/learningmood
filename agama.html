<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Agama</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #0a0a0a; --paper: #f4f0e6; --red: #e8441a; --mid: #c5bca8; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--mid) 1px, transparent 1px),
      linear-gradient(90deg, var(--mid) 1px, transparent 1px);
    background-size: 44px 44px;
    opacity: 0.28;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3rem 2rem;
    max-width: 480px;
    background: #fffdf7;
    border: 2px solid var(--ink);
    border-radius: 8px;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 0.6rem;
  }
  p { font-size: 0.95rem; color: #666; line-height: 1.6; margin-bottom: 1.8rem; }
  a {
    display: inline-block;
    padding: 0.85rem 2rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    background: var(--ink);
    color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 4px;
    text-decoration: none;
    transition: background 0.15s;
  }
  a:hover { background: var(--red); border-color: var(--red); }
</style>
</head>
<body>
<div class="container">
  <div class="icon">🔥</div>
  <h1>Kuis Agama</h1>
  <p>Soal kuis Agama belum ditambahkan.<br>Silakan minta admin untuk menambahkan soal ke halaman ini.</p>
  <a href="index.html">← Kembali ke Menu</a>
</div>
</body>
</html>
